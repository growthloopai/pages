<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Feedback</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="assets/css/style.css">
    </head>
    <body>
        <div class="restaurant-banner">
            <img src="assets/images/voc.png" alt="VOC Restaurant">
            <span class="restaurant-name">VOC</span>
        </div>

        <h1>How did we do?</h1>

        <!-- Step 1: Face selection -->
        <div id="face-selection" class="face-icons">
            <img src="assets/images/happy_green_face.jpg" alt="Happy" data-mood="happy">
            <img src="assets/images/neutral_yellow_face.jpg" alt="Neutral" data-mood="neutral">
            <img src="assets/images/sad_red_face.jpg" alt="Sad" data-mood="sad">
        </div>

        <!-- Step 2b: Improve (shown after neutral/sad face is clicked) -->
        <div id="improve" style="display:none">
            <h2>What should we improve?</h2>
            <div class="improve-options">
                <div class="improve-option">
                    <img src="assets/images/food.jpeg" alt="Food">
                    <p>Food</p>
                </div>
                <div class="improve-option">
                    <img src="assets/images/male_server_390.jpg" alt="Service">
                    <p>Service</p>
                </div>
                <div class="improve-option improve-option--both">
                    <div class="improve-both-images">
                        <img src="assets/images/food.jpeg" alt="Food">
                        <span class="improve-plus">+</span>
                        <img src="assets/images/male_server_390.jpg" alt="Service">
                    </div>
                    <p>Food &amp; Service</p>
                </div>
            </div>
        </div>

        <!-- Step 2c: Improve questions (shown after an improve option is clicked) -->
        <form id="improve-questions" action="thank-you.html" style="display:none">
            <div id="iq-taste" class="question" style="display:none">
                <label class="question-title">Food taste</label>
                <div class="stars" role="radiogroup" aria-label="Food taste">
                    <input type="radio" id="taste-1" name="taste" value="1"><label for="taste-1">&#9733;</label>
                    <input type="radio" id="taste-2" name="taste" value="2"><label for="taste-2">&#9733;</label>
                    <input type="radio" id="taste-3" name="taste" value="3"><label for="taste-3">&#9733;</label>
                    <input type="radio" id="taste-4" name="taste" value="4"><label for="taste-4">&#9733;</label>
                    <input type="radio" id="taste-5" name="taste" value="5"><label for="taste-5">&#9733;</label>
                </div>
            </div>
            <div id="iq-portion" class="question" style="display:none">
                <label class="question-title">Portion size</label>
                <div class="stars" role="radiogroup" aria-label="Portion size">
                    <input type="radio" id="portion-1" name="portion" value="1"><label for="portion-1">&#9733;</label>
                    <input type="radio" id="portion-2" name="portion" value="2"><label for="portion-2">&#9733;</label>
                    <input type="radio" id="portion-3" name="portion" value="3"><label for="portion-3">&#9733;</label>
                    <input type="radio" id="portion-4" name="portion" value="4"><label for="portion-4">&#9733;</label>
                    <input type="radio" id="portion-5" name="portion" value="5"><label for="portion-5">&#9733;</label>
                </div>
            </div>
            <div id="iq-timely" class="question" style="display:none">
                <label class="question-title">Timely service</label>
                <div class="stars" role="radiogroup" aria-label="Timely service">
                    <input type="radio" id="timely-1" name="timely" value="1"><label for="timely-1">&#9733;</label>
                    <input type="radio" id="timely-2" name="timely" value="2"><label for="timely-2">&#9733;</label>
                    <input type="radio" id="timely-3" name="timely" value="3"><label for="timely-3">&#9733;</label>
                    <input type="radio" id="timely-4" name="timely" value="4"><label for="timely-4">&#9733;</label>
                    <input type="radio" id="timely-5" name="timely" value="5"><label for="timely-5">&#9733;</label>
                </div>
            </div>
            <div id="iq-hospitality" class="question" style="display:none">
                <label class="question-title">Hospitality &amp; Knowledge</label>
                <div class="stars" role="radiogroup" aria-label="Hospitality and Knowledge">
                    <input type="radio" id="hosp-1" name="hospitality" value="1"><label for="hosp-1">&#9733;</label>
                    <input type="radio" id="hosp-2" name="hospitality" value="2"><label for="hosp-2">&#9733;</label>
                    <input type="radio" id="hosp-3" name="hospitality" value="3"><label for="hosp-3">&#9733;</label>
                    <input type="radio" id="hosp-4" name="hospitality" value="4"><label for="hosp-4">&#9733;</label>
                    <input type="radio" id="hosp-5" name="hospitality" value="5"><label for="hosp-5">&#9733;</label>
                </div>
            </div>
            <button type="submit">Submit</button>
        </form>

        <!-- Step 2: Questions (shown after happy face is clicked) -->
        <form id="questions" action="thank-you.html" style="display:none">
            <div class="question">
                <div class="question-img-wrap">
                    <div class="question-img-label">
                        <img class="question-img" src="assets/images/food.jpeg" alt="Food">
                        <p class="question-label">Food quality</p>
                    </div>
                    <div class="stars" role="radiogroup" aria-label="Food rating">
                        <input type="radio" id="food-1" name="food" value="1"><label for="food-1">&#9733;</label>
                        <input type="radio" id="food-2" name="food" value="2"><label for="food-2">&#9733;</label>
                        <input type="radio" id="food-3" name="food" value="3"><label for="food-3">&#9733;</label>
                        <input type="radio" id="food-4" name="food" value="4"><label for="food-4">&#9733;</label>
                        <input type="radio" id="food-5" name="food" value="5"><label for="food-5">&#9733;</label>
                    </div>
                </div>
            </div>

            <div class="question">
                <div class="question-img-wrap">
                    <div class="question-img-label">
                        <img class="question-img" src="assets/images/male_server_390.jpg" alt="Server">
                        <p class="question-label">Service</p>
                    </div>
                    <div class="stars" role="radiogroup" aria-label="Server rating">
                        <input type="radio" id="server-1" name="server" value="1"><label for="server-1">&#9733;</label>
                        <input type="radio" id="server-2" name="server" value="2"><label for="server-2">&#9733;</label>
                        <input type="radio" id="server-3" name="server" value="3"><label for="server-3">&#9733;</label>
                        <input type="radio" id="server-4" name="server" value="4"><label for="server-4">&#9733;</label>
                        <input type="radio" id="server-5" name="server" value="5"><label for="server-5">&#9733;</label>
                    </div>
                </div>
            </div>

            <a id="google-review-btn" href="https://www.google.com/maps/search/?api=1&query=VOC%20Restaurant%20%26%20Espresso%20Bar&query_place_id=ChIJx5iI1llz4ToRmf4e2FmVF0g" target="_blank" style="display:none">Leave a Google review</a>
            <button type="submit">Submit</button>
        </form>

        <script>
            function checkPerfectScore() {
                const food = document.querySelector('input[name="food"]:checked');
                const server = document.querySelector('input[name="server"]:checked');
                const btn = document.getElementById('google-review-btn');
                btn.style.display = (food && food.value === '5' && server && server.value === '5') ? 'block' : 'none';
            }

            document.getElementById('questions').addEventListener('change', checkPerfectScore);

            document.getElementById('face-selection').addEventListener('click', function(e) {
                const mood = e.target.dataset.mood;
                if (!mood) return;
                this.style.display = 'none';
                if (mood === 'happy') {
                    document.getElementById('questions').style.display = 'block';
                } else {
                    document.getElementById('improve').style.display = 'block';
                }
            });

            document.getElementById('improve').addEventListener('click', function(e) {
                const option = e.target.closest('.improve-option');
                if (!option) return;
                const options = Array.from(document.querySelectorAll('.improve-option'));
                const index = options.indexOf(option);
                const showFood = index === 0 || index === 2;
                const showService = index === 1 || index === 2;
                document.getElementById('iq-taste').style.display = showFood ? 'block' : 'none';
                document.getElementById('iq-portion').style.display = showFood ? 'block' : 'none';
                document.getElementById('iq-timely').style.display = showService ? 'block' : 'none';
                document.getElementById('iq-hospitality').style.display = showService ? 'block' : 'none';
                this.style.display = 'none';
                document.getElementById('improve-questions').style.display = 'block';
            });
        </script>
    </body>
</html>
